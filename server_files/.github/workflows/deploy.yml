name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to somekorean.com
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend (Vue3 + Vite)
        run: npm run build

      - name: Copy built assets to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "public/build"
          target: "/var/www/somekorean/public"
          strip_components: 1

      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/somekorean
            git config --global --add safe.directory /var/www/somekorean
            git pull origin main
            composer install --no-dev --optimize-autoloader --no-interaction -q
            php8.2 artisan migrate --force
            php8.2 artisan config:cache
            php8.2 artisan route:cache
            php8.2 artisan view:cache
            php8.2 artisan storage:link --force 2>/dev/null || true
            chown -R www-data:www-data storage bootstrap/cache public/build
            chmod -R 775 storage bootstrap/cache
            systemctl restart php8.2-fpm
            supervisorctl reload 2>/dev/null || true
            echo "Deployed successfully to somekorean.com!"
