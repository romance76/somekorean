<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; font-family: Arial, sans-serif; color: white; overflow: hidden; padding-top: 8px; }
#topbar { display: flex; justify-content: space-between; align-items: center; width: 396px; max-width: 95vw; margin-bottom: 8px; }
#exitBtn { background: #475569; border: none; color: white; padding: 6px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
#exitBtn:hover { background: #64748b; }
#hdr { display: flex; gap: 14px; font-size: 14px; }
#sc { color: #4ade80; font-weight: bold; font-size: 18px; }
#hi { color: #94a3b8; font-size: 12px; }
#lvBadge { background: rgba(74,222,128,0.18); color: #4ade80; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; align-self: center; }
canvas { border: 2px solid #4ade80; border-radius: 4px; }
#ov { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 20px; }
#ov h2 { font-size: 28px; color: #4ade80; }
.btn { background: #4ade80; color: #1a1a2e; border: none; padding: 11px 24px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; }
.btn-b { background: #475569; color: white; }
.lvl-row { display: flex; gap: 6px; margin: 10px 0 4px; flex-wrap: wrap; justify-content: center; }
.lvl { background: #334155; color: #cbd5e1; border: 2px solid #475569; padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; min-width: 80px; }
.lvl.sel { background: #4ade80; color: #1a1a2e; border-color: #4ade80; }
.lvl-desc { color: #94a3b8; font-size: 11px; text-align: center; max-width: 280px; }
#pad { display: grid; grid-template-columns: repeat(3,46px); gap:4px; margin-top:8px; }
.pb { background: #334155; border: 1px solid #4ade80; color: white; width:46px; height:46px; border-radius:6px; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; user-select:none; -webkit-user-select:none; }
.pb:active { background: #4ade80; color: #1a1a2e; }
</style>
</head>
<body>
<div id="topbar">
  <button id="exitBtn" onclick="exit()">← 나가기</button>
  <div id="hdr"><div id="sc">점수: 0</div><div id="hi">최고: 0</div></div>
  <div id="lvBadge">Lv.1</div>
</div>
<canvas id="c"></canvas>
<div id="pad">
  <div></div><button class="pb" id="bU">&#9650;</button><div></div>
  <button class="pb" id="bL">&#9664;</button><button class="pb" id="bD">&#9660;</button><button class="pb" id="bR">&#9654;</button>
</div>
<div id="ov">
  <h2>&#128013; 뱀 게임</h2>
  <p style="color:#94a3b8">방향키 또는 버튼으로 조작</p>
  <p style="color:#cbd5e1; font-size:13px;">난이도를 선택하세요</p>
  <div class="lvl-row" id="lvlRow">
    <button class="lvl sel" data-lvl="1" data-speed="180">🐢 쉬움</button>
    <button class="lvl" data-lvl="2" data-speed="130">🚶 보통</button>
    <button class="lvl" data-lvl="3" data-speed="90">🏃 빠름</button>
    <button class="lvl" data-lvl="4" data-speed="60">⚡ 매우빠름</button>
  </div>
  <p class="lvl-desc">먹을때마다 살짝씩 빨라집니다 (난이도에 따라 시작 속도가 다름)</p>
  <div style="display:flex; gap:8px;">
    <button class="btn btn-b" onclick="exit()">나가기</button>
    <button class="btn" onclick="start()">게임 시작</button>
  </div>
</div>
<script>
const cv=document.getElementById('c'),ctx=cv.getContext('2d'),ov=document.getElementById('ov'),sc=document.getElementById('sc'),hi=document.getElementById('hi'),lvBadge=document.getElementById('lvBadge');
const SZ=18,N=22;cv.width=SZ*N;cv.height=SZ*N;
let sn,dir,nd,food,pts,best=0,iv,run=false,curLvl=1,baseSpeed=180;

document.getElementById('lvlRow').addEventListener('click',e=>{
  const b=e.target.closest('.lvl');if(!b)return;
  document.querySelectorAll('.lvl').forEach(x=>x.classList.remove('sel'));
  b.classList.add('sel');
  curLvl=parseInt(b.dataset.lvl);
  baseSpeed=parseInt(b.dataset.speed);
  lvBadge.textContent='Lv.'+curLvl;
});

function start(){
  sn=[{x:11,y:11},{x:10,y:11},{x:9,y:11}];
  dir={x:1,y:0};nd={x:1,y:0};pts=0;run=true;
  ov.style.display='none';sc.textContent='점수: 0';
  lvBadge.textContent='Lv.'+curLvl;
  place();clearInterval(iv);iv=setInterval(tick,baseSpeed);
}
function place(){do{food={x:Math.floor(Math.random()*N),y:Math.floor(Math.random()*N)}}while(sn.some(s=>s.x===food.x&&s.y===food.y));}
function tick(){
  dir=nd;
  const h={x:sn[0].x+dir.x,y:sn[0].y+dir.y};
  if(h.x<0||h.x>=N||h.y<0||h.y>=N||sn.some(s=>s.x===h.x&&s.y===h.y)){over();return;}
  sn.unshift(h);
  if(h.x===food.x&&h.y===food.y){
    pts+=10;
    if(pts>best){best=pts;hi.textContent='최고: '+best;}
    sc.textContent='점수: '+pts;
    place();
    // 100점마다 약간씩 빨라짐 (최소 50ms 까지만)
    if(pts%100===0){
      const newSpeed=Math.max(50, baseSpeed-Math.floor(pts/100)*15);
      clearInterval(iv);iv=setInterval(tick,newSpeed);
    }
  } else sn.pop();
  draw();
}
function draw(){
  ctx.fillStyle='#0f172a';ctx.fillRect(0,0,cv.width,cv.height);
  ctx.strokeStyle='#1e293b';ctx.lineWidth=0.5;
  for(let i=0;i<=N;i++){ctx.beginPath();ctx.moveTo(i*SZ,0);ctx.lineTo(i*SZ,cv.height);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*SZ);ctx.lineTo(cv.width,i*SZ);ctx.stroke();}
  ctx.fillStyle='#f87171';ctx.beginPath();ctx.arc(food.x*SZ+SZ/2,food.y*SZ+SZ/2,SZ/2-2,0,Math.PI*2);ctx.fill();
  sn.forEach((s,i)=>{ctx.fillStyle=i===0?'#86efac':'#4ade80';ctx.beginPath();ctx.roundRect(s.x*SZ+1,s.y*SZ+1,SZ-2,SZ-2,3);ctx.fill();});
}
function over(){
  clearInterval(iv);run=false;
  ov.innerHTML='<h2>게임 오버</h2><p>난이도: <strong>Lv.'+curLvl+'</strong></p><p>점수: <strong style="color:#4ade80">'+pts+'</strong></p><div style="display:flex;gap:10px"><button class="btn btn-b" onclick="exit()">나가기</button><button class="btn" onclick="location.reload()">다시하기</button></div>';
  ov.style.display='flex';
  window.parent.postMessage({type:'GAME_SCORE',game:'snake',score:pts,level:curLvl},'*');
}
function exit(){window.parent.postMessage({type:'GAME_EXIT',game:'snake'},'*');}
document.addEventListener('keydown',e=>{if(!run)return;const m={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};const d=m[e.key];if(d&&!(d.x===-dir.x&&d.y===-dir.y)){nd=d;e.preventDefault();}});
document.getElementById('bU').addEventListener('click',()=>{if(dir.y!==1)nd={x:0,y:-1}});
document.getElementById('bD').addEventListener('click',()=>{if(dir.y!==-1)nd={x:0,y:1}});
document.getElementById('bL').addEventListener('click',()=>{if(dir.x!==1)nd={x:-1,y:0}});
document.getElementById('bR').addEventListener('click',()=>{if(dir.x!==-1)nd={x:1,y:0}});
ctx.fillStyle='#0f172a';ctx.fillRect(0,0,cv.width,cv.height);
</script>
</body>
</html>
